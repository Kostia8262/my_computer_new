<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 — Сторінку не знайдено | My Computer Academy</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,Arial,sans-serif;background:linear-gradient(135deg,#0D0C1A 0%,#1a0e3a 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(108,71,255,.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,111,255,.12) 0%,transparent 50%);pointer-events:none}
.card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:64px 48px;max-width:560px;width:100%;text-align:center;position:relative;z-index:1}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:48px;text-decoration:none;color:#fff}
.logo img{width:44px;height:44px;border-radius:50%}
.logo span{font-weight:800;font-size:17px;opacity:.9}
.code{font-size:clamp(96px,20vw,160px);font-weight:900;line-height:1;background:linear-gradient(135deg,#6C47FF,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.emoji{font-size:48px;margin:16px 0 0;display:block}
h1{font-size:clamp(20px,4vw,28px);font-weight:800;margin:16px 0 12px}
p{color:rgba(255,255,255,.6);font-size:16px;line-height:1.7;margin-bottom:36px}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-home{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:#6C47FF;color:#fff;border-radius:14px;font-weight:700;font-size:16px;text-decoration:none;transition:all .2s;box-shadow:0 4px 20px rgba(108,71,255,.5)}
.btn-home:hover{background:#5533EE;transform:translateY(-2px);box-shadow:0 8px 28px rgba(108,71,255,.6)}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:rgba(255,255,255,.1);color:#fff;border-radius:14px;font-weight:600;font-size:15px;cursor:pointer;border:1px solid rgba(255,255,255,.15);transition:all .2s;text-decoration:none}
.btn-back:hover{background:rgba(255,255,255,.18)}
.contact{margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.1);font-size:14px;color:rgba(255,255,255,.4)}
.contact a{color:rgba(178,151,255,.85);font-weight:600;text-decoration:none}
.contact a:hover{color:#a78bfa}
@media(max-width:500px){
  .card{padding:44px 24px;border-radius:24px}
  .actions{flex-direction:column}
  .btn-home,.btn-back{justify-content:center}
}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <img src="/android-chrome-192x192.png" alt="My Computer Academy"/>
    <span>My Computer Academy</span>
  </a>
  <div class="code">404</div>
  <span class="emoji">🔍</span>
  <h1>Сторінку не знайдено</h1>
  <p>Схоже, ця сторінка переїхала або ніколи не існувала.<br/>Давайте повернемося до чогось реального.</p>
  <div class="actions">
    <a href="/" class="btn-home">← На головну</a>
    <a href="javascript:history.back()" class="btn-back">Назад</a>
  </div>
  <div class="contact">
    Потрібна допомога? <a href="tel:+380954624672">+38 (095) 462-46-72</a>
  </div>
</div>
</body>
</html>
