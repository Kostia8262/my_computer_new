<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата успішна — My Computer Academy</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body{display:flex;flex-direction:column;min-height:100vh;background:var(--color-bg)}
    .pay-result{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
    .pay-result__box{max-width:440px}
    .pay-result__icon{font-size:64px;line-height:1;margin-bottom:24px}
    .pay-result__title{font-size:28px;font-weight:800;margin-bottom:12px;color:var(--color-text)}
    .pay-result__text{color:var(--color-text-muted);font-size:16px;line-height:1.6;margin-bottom:32px}
  </style>
</head>
<body>
  <div class="pay-result">
    <div class="pay-result__box">
      <div class="pay-result__icon">✅</div>
      <h1 class="pay-result__title">Оплата успішна!</h1>
      <p class="pay-result__text">Дякуємо! Платіж отримано. Ми зв'яжемося з вами найближчим часом.</p>
      <a href="/" class="btn btn--primary btn--lg">На головну</a>
    </div>
  </div>
</body>
</html>
