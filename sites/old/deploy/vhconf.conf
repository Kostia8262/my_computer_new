docRoot                   $VH_ROOT/html/
enableGzip                1

errorlog $VH_ROOT/mycomputer.education/logs/error.log {
  useServer               1
  logLevel                DEBUG
  rollingSize             10M
}

index  {
  useServer               1
  indexFiles              index.html
}

errorpage 404 {
  url                     *
}

scripthandler  {
  add                     lsapi:lsphp html
}

context /.well-known/ {
  location                /usr/local/lsws/mycomputer.education/html/.well-known/
  allowBrowse             1
  addDefaultCharset       off
}

context /admin-static/ {
  location                /usr/local/lsws/mycomputer.education/html/server/static/
  allowBrowse             1
  addDefaultCharset       off
}

context /media/ {
  location                /usr/local/lsws/mycomputer.education/html/server/media/
  allowBrowse             1
  addDefaultCharset       off
}

context /api/ {
  type                    appserver
  location                /usr/local/lsws/mycomputer.education/html/server/
  binPath                 /usr/local/lsws/fcgi-bin/lswsgi
  appType                 wsgi
  startupFile             server/wsgi.py
  addDefaultCharset       off
}

context / {
  location                /usr/local/lsws/mycomputer.education/html/client/
  allowBrowse             1
  indexFiles              index.html
  rewrite  {
    enable                1
  }
  addDefaultCharset       off
}

rewrite  {
  enable                  1
RewriteEngine On
RewriteCond %{HTTPS} !=on
RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
}

vhssl  {
  keyFile                 /etc/letsencrypt/live/mycomputer.education/privkey.pem
  certFile                /etc/letsencrypt/live/mycomputer.education/fullchain.pem
  certChain               1
}
