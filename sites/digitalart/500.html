<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<meta name="robots" content="noindex"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,Arial,sans-serif;background:linear-gradient(135deg,#1C1210 0%,#1a0e3a 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(220,38,38,.1) 0%,transparent 55%),radial-gradient(ellipse at 70% 20%,rgba(226,96,74,.12) 0%,transparent 50%);pointer-events:none}
.card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:64px 48px;max-width:560px;width:100%;text-align:center;position:relative;z-index:1}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:48px;text-decoration:none;color:#fff}
.logo img{width:44px;height:44px;border-radius:50%}
.logo span{font-weight:800;font-size:17px;opacity:.9}
.code{font-size:clamp(96px,20vw,160px);font-weight:900;line-height:1;background:linear-gradient(135deg,#dc2626,#f87171);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.emoji{font-size:48px;margin:16px 0 0;display:block}
h1{font-size:clamp(20px,4vw,28px);font-weight:800;margin:16px 0 12px}
p{color:rgba(255,255,255,.6);font-size:16px;line-height:1.7;margin-bottom:36px}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-home{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:#E2604A;color:#fff;border-radius:14px;font-weight:700;font-size:16px;text-decoration:none;transition:all .2s;box-shadow:0 4px 20px rgba(226,96,74,.5)}
.btn-home:hover{background:#C94B37;transform:translateY(-2px);box-shadow:0 8px 28px rgba(226,96,74,.6)}
.btn-reload{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:rgba(255,255,255,.1);color:#fff;border-radius:14px;font-weight:600;font-size:15px;cursor:pointer;border:1px solid rgba(255,255,255,.15);transition:all .2s;text-decoration:none}
.btn-reload:hover{background:rgba(255,255,255,.18)}
.contact{margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.1);font-size:14px;color:rgba(255,255,255,.4)}
.contact a{color:rgba(178,151,255,.85);font-weight:600;text-decoration:none}
.contact a:hover{color:#a78bfa}
@media(max-width:500px){
  .card{padding:44px 24px;border-radius:24px}
  .actions{flex-direction:column}
  .btn-home,.btn-reload{justify-content:center}
}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div style="width:44px;height:44px;background:#E2604A;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="24" height="24" viewBox="0 0 32 32" fill="none"><path d="M8 11L13 16L8 21" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 21H24" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
    <span>My Computer Academy</span>
  </a>
  <div class="code">500</div>
  <span class="emoji">⚙️</span>
  <h1>Помилка на сервері</h1>
  <p>Щось пішло не так із нашого боку. Ми вже знаємо про проблему та усуваємо її. Спробуйте оновити сторінку через кілька хвилин.</p>
  <div class="actions">
    <a href="/" class="btn-home">← На головну</a>
    <a href="javascript:location.reload()" class="btn-reload">🔄 Оновити</a>
  </div>
  <div class="contact">
    Термінова допомога: <a href="tel:+380954624672">+38 (095) 462-46-72</a>
  </div>
</div>
</body>
</html>
