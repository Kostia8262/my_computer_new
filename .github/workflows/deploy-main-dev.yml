name: Deploy Main Site DEV (dev.mycomputer.education)

on:
  push:
    branches: [develop]
    paths:
      - 'sites/main/**'
      - '.github/workflows/deploy-main-dev.yml'

concurrency:
  group: deploy-main-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts || true

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /var/www/mycomputer-new-dev && git fetch origin develop && git reset --hard origin/develop && cd sites/main && npm install --production --silent && pm2 restart mycomputer-dev && echo Deploy complete"

      - name: Health check
        run: |
          sleep 10
          curl -f --retry 3 --retry-delay 5 https://dev.mycomputer.education/ \
            && echo "Health check passed" \
            || (echo "Health check FAILED" && exit 1)
