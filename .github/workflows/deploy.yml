name: Deploy to VPS

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts || true

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /var/www/mycomputer-new && git pull origin master && npm install --production --silent && pm2 restart mycomputer-new && echo Deploy complete"

      - name: Health check
        run: |
          sleep 10
          curl -f --retry 3 --retry-delay 5 https://mycomputer.education/ \
            && echo "Health check passed" \
            || (echo "Health check FAILED" && exit 1)
