<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — My Computer Academy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Arial,sans-serif;background:#f0eeff;color:#1a1a2e;min-height:100vh}
a{color:#6C47FF;text-decoration:none}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(108,71,255,.12)}
.login-box h1{font-size:20px;margin-bottom:6px}
.login-box p{color:#888;font-size:14px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 14px;border:1.5px solid #e0d9ff;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#6C47FF}
.login-box button{width:100%;padding:12px;background:#6C47FF;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.login-box button:hover{background:#5533EE}
.login-error{color:#e53e3e;font-size:13px;margin-top:8px;display:none}
.logo-row{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.logo-icon{width:36px;height:36px;background:#6C47FF;border-radius:8px;display:flex;align-items:center;justify-content:center}

/* LAYOUT */
.app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e8e4ff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:#6C47FF;color:#fff}.btn-primary:hover{background:#5533EE}
.btn-ghost{background:#f0eeff;color:#6C47FF;border:1.5px solid #e0d9ff}.btn-ghost:hover{background:#e0d9ff}
.btn-danger{background:#fff0f0;color:#e53e3e;border:1.5px solid #fecaca}.btn-danger:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:12px}

.main{padding:24px;max-width:1200px;margin:0 auto;width:100%}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat{background:#fff;border-radius:12px;padding:18px;border:1px solid #e8e4ff}
.stat-num{font-size:28px;font-weight:800;color:#6C47FF}
.stat-label{font-size:13px;color:#888;margin-top:2px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid #e0d9ff;border-radius:8px;font-size:14px;outline:none}
.search:focus{border-color:#6C47FF}
.filter-select{padding:9px 12px;border:1.5px solid #e0d9ff;border-radius:8px;font-size:13px;outline:none;background:#fff;cursor:pointer}
.filter-select:focus{border-color:#6C47FF}

/* TABLE */
.table-wrap{background:#fff;border-radius:12px;border:1px solid #e8e4ff;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{padding:12px 14px;text-align:left;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #f0eeff;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid #f8f7ff;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9ff}
.phone-link{color:#1a1a2e;font-weight:600}
.phone-link:hover{color:#6C47FF}

/* STATUS BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.badge-new{background:#e8f4ff;color:#2563eb}
.badge-contacted{background:#fef9e7;color:#b45309}
.badge-trial{background:#f0e8ff;color:#7c3aed}
.badge-enrolled{background:#e8f5e9;color:#15803d}
.badge-rejected{background:#fff0f0;color:#dc2626}

/* COURSE CHIP */
.chip{display:inline-flex;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#f0eeff;color:#6C47FF}

/* STATUS SELECT */
.status-sel{padding:4px 8px;border:1.5px solid #e0d9ff;border-radius:6px;font-size:12px;background:#fff;cursor:pointer;outline:none}
.status-sel:focus{border-color:#6C47FF}

/* NOTES */
.notes-input{width:100%;padding:4px 8px;border:1.5px solid #e0d9ff;border-radius:6px;font-size:12px;outline:none;min-width:120px}
.notes-input:focus{border-color:#6C47FF}

/* EMPTY */
.empty{padding:60px 20px;text-align:center;color:#aaa}
.empty svg{margin-bottom:12px;opacity:.3}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:#15803d}
.toast.error{background:#dc2626}

/* PAGINATION */
.pager{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:1px solid #f0eeff;font-size:13px;color:#888}
.pager-btns{display:flex;gap:6px}

@media(max-width:700px){
  .main{padding:14px}
  .topbar{padding:0 14px}
  th,td{padding:9px 10px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="logo-row">
      <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 32 32" fill="none"><path d="M8 11L13 16L8 21" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 21H24" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
      <span style="font-weight:800">My Computer Academy</span>
    </div>
    <h1>Вхід в адмін-панель</h1>
    <p>Введіть адмін-токен для доступу до заявок</p>
    <input type="password" id="tokenInput" placeholder="Адмін-токен" autocomplete="current-password"/>
    <button onclick="doLogin()">Увійти →</button>
    <div class="login-error" id="loginError">Невірний токен. Спробуйте ще раз.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-icon" style="width:32px;height:32px;background:#6C47FF;border-radius:7px;display:flex;align-items:center;justify-content:center">
        <svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path d="M8 11L13 16L8 21" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 21H24" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
      </div>
      <span id="panelTitle">Admin Panel</span>
      <span id="roleBadge" style="font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;margin-left:8px"></span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm superadmin-only" id="adminsTabBtn" onclick="showTab('admins')" style="display:none">👥 Адміни</button>
      <button class="btn btn-ghost btn-sm" onclick="showTab('leads')">📋 Заявки</button>
      <a href="/" target="_blank" class="btn btn-ghost btn-sm">← Сайт</a>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 CSV</button>
      <button class="btn btn-ghost btn-sm" onclick="loadLeads()">🔄 Оновити</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Вийти</button>
    </div>
  </div>

  <div class="main">
    <!-- ADMINS TAB (superadmin only) -->
    <div id="adminsTab" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <h2 style="font-size:18px;font-weight:800">👥 Управління адміністраторами</h2>
        <button class="btn btn-primary btn-sm" onclick="showCreateAdminForm()">+ Додати адміна</button>
      </div>
      <div id="createAdminForm" style="display:none;background:#fff;border:1px solid #e8e4ff;border-radius:12px;padding:20px;margin-bottom:20px">
        <div style="display:flex;gap:10px;align-items:flex-end">
          <div style="flex:1">
            <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#888">Ім'я адміністратора</label>
            <input id="newAdminName" class="search" placeholder="Наприклад: Менеджер Ірина" style="margin:0"/>
          </div>
          <button class="btn btn-primary" onclick="createAdmin()">Створити</button>
          <button class="btn btn-ghost" onclick="document.getElementById('createAdminForm').style.display='none'">Скасувати</button>
        </div>
      </div>
      <div class="table-wrap">
        <table style="width:100%;border-collapse:collapse;font-size:14px">
          <thead><tr>
            <th style="padding:12px 14px;text-align:left;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;border-bottom:1px solid #f0eeff">Ім'я</th>
            <th style="padding:12px 14px;text-align:left;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;border-bottom:1px solid #f0eeff">Токен</th>
            <th style="padding:12px 14px;text-align:left;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;border-bottom:1px solid #f0eeff">Статус</th>
            <th style="padding:12px 14px;text-align:left;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;border-bottom:1px solid #f0eeff">Створено</th>
            <th style="padding:12px 14px;border-bottom:1px solid #f0eeff"></th>
          </tr></thead>
          <tbody id="adminsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- LEADS TAB -->
    <div id="leadsTab">
    <!-- STATS -->
    <div class="stats" id="statsRow"></div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <input class="search" id="searchInput" placeholder="🔍 Пошук по імені, телефону, курсу..." oninput="renderTable()"/>
      <select class="filter-select" id="statusFilter" onchange="renderTable()">
        <option value="">Всі статуси</option>
        <option value="new">🔵 Нові</option>
        <option value="contacted">🟡 Зв'язалися</option>
        <option value="trial_scheduled">🟣 Пробний заплановано</option>
        <option value="enrolled">🟢 Записані</option>
        <option value="rejected">🔴 Відмова</option>
      </select>
      <select class="filter-select" id="courseFilter" onchange="renderTable()">
        <option value="">Всі курси</option>
        <option value="scratch">Scratch</option>
        <option value="python">Python</option>
        <option value="roblox">Roblox</option>
        <option value="web">Веб-розробка</option>
        <option value="help">Допоможіть обрати</option>
      </select>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table id="leadsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Дитина</th>
            <th>Вік</th>
            <th>Курс</th>
            <th>Телефон</th>
            <th>Email</th>
            <th>Статус</th>
            <th>Нотатки</th>
            <th>Дата</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="leadsBody"></tbody>
      </table>
      <div class="pager" id="pager"></div>
    </div>
    </div><!-- /leadsTab -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const STORAGE_KEY = 'mca_admin_token';
const PAGE_SIZE   = 20;

let allLeads    = [];
let filtered    = [];
let currentPage = 1;
let token       = localStorage.getItem(STORAGE_KEY) || '';
let currentRole = '';

const STATUS_LABELS = {
  new:               '🔵 Новий',
  contacted:         '🟡 Зв\'язалися',
  trial_scheduled:   '🟣 Пробний',
  enrolled:          '🟢 Записаний',
  rejected:          '🔴 Відмова',
};
const COURSE_LABELS = {
  scratch: 'Scratch',
  python:  'Python',
  roblox:  'Roblox',
  web:     'Веб',
  help:    'Допоможіть',
};

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const t   = document.getElementById('tokenInput').value.trim();
  const btn = document.querySelector('.login-box button');
  const err = document.getElementById('loginError');
  if (!t) { err.textContent = 'Введіть токен.'; err.style.display = 'block'; return; }

  btn.textContent = 'Перевіряємо…';
  btn.disabled    = true;
  err.style.display = 'none';

  try {
    const res = await fetch('/api/leads', { headers: { 'x-admin-token': t } });
    if (res.status === 401) {
      err.textContent   = 'Невірний токен. Перевірте значення ADMIN_TOKEN у файлі .env';
      err.style.display = 'block';
      return;
    }
    if (!res.ok) {
      err.textContent   = `Помилка сервера: ${res.status}`;
      err.style.display = 'block';
      return;
    }
    token = t;
    localStorage.setItem(STORAGE_KEY, token);
    showApp();
  } catch (e) {
    err.textContent   = 'Не вдалося підключитися до сервера. Переконайтеся, що npm start запущено.';
    err.style.display = 'block';
  } finally {
    btn.textContent = 'Увійти →';
    btn.disabled    = false;
  }
}

function doLogout() {
  localStorage.removeItem(STORAGE_KEY);
  token = '';
  document.getElementById('app').style.display        = 'none';
  document.getElementById('loginWrap').style.display  = 'flex';
}

document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
async function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').style.display       = 'flex';
  await loadMe();
  await loadLeads();
  showTab('leads');
}

async function loadMe() {
  try {
    const res = await fetch('/api/me', { headers: { 'x-admin-token': token } });
    if (!res.ok) { doLogout(); return; }
    const data = await res.json();
    currentRole = data.role;

    const badge = document.getElementById('roleBadge');
    if (badge) {
      badge.textContent       = currentRole === 'superadmin' ? '⭐ Суперадмін' : '🔹 Адмін';
      badge.style.background  = currentRole === 'superadmin' ? '#fef9c3' : '#e8f4ff';
      badge.style.color       = currentRole === 'superadmin' ? '#854d0e' : '#2563eb';
    }
    const title = document.getElementById('panelTitle');
    if (title) title.textContent = data.name || 'Admin Panel';

    const adminsBtn = document.getElementById('adminsTabBtn');
    if (adminsBtn) adminsBtn.style.display = currentRole === 'superadmin' ? 'inline-flex' : 'none';
  } catch (e) { console.error('loadMe', e); }
}

function showTab(tab) {
  document.getElementById('leadsTab').style.display  = tab === 'leads'  ? '' : 'none';
  document.getElementById('adminsTab').style.display = tab === 'admins' ? '' : 'none';
  if (tab === 'admins') renderAdmins();
}

async function loadLeads() {
  try {
    const res  = await fetch('/api/leads', { headers: { 'x-admin-token': token } });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    allLeads = data.leads || [];
    currentPage = 1;
    renderStats();
    renderTable();
  } catch {
    showToast('Помилка завантаження', 'error');
  }
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const counts = { total: allLeads.length, new: 0, contacted: 0, trial_scheduled: 0, enrolled: 0, rejected: 0 };
  allLeads.forEach(l => { if (counts[l.status] !== undefined) counts[l.status]++; });

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-num">${counts.total}</div><div class="stat-label">Всього заявок</div></div>
    <div class="stat"><div class="stat-num" style="color:#2563eb">${counts.new}</div><div class="stat-label">Нові</div></div>
    <div class="stat"><div class="stat-num" style="color:#b45309">${counts.contacted}</div><div class="stat-label">Зв'язалися</div></div>
    <div class="stat"><div class="stat-num" style="color:#7c3aed">${counts.trial_scheduled}</div><div class="stat-label">Пробний заплановано</div></div>
    <div class="stat"><div class="stat-num" style="color:#15803d">${counts.enrolled}</div><div class="stat-label">Записані</div></div>
  `;
}

// ── TABLE ─────────────────────────────────────────────────────────────────────
function renderTable() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const course = document.getElementById('courseFilter').value;

  filtered = allLeads.filter(l => {
    if (status && l.status !== status) return false;
    if (course && l.course !== course) return false;
    if (q) {
      const hay = [l.child_name, l.phone, l.email, l.course, l.notes].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const page = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  const tbody = document.getElementById('leadsBody');
  if (!page.length) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6M9 16h6M7 4H4a1 1 0 00-1 1v14a1 1 0 001 1h16a1 1 0 001-1V5a1 1 0 00-1-1h-3M9 4a2 2 0 002 2h2a2 2 0 002-2M9 4a2 2 0 012-2h2a2 2 0 012 2"/></svg><div>Заявок не знайдено</div></div></td></tr>`;
  } else {
    tbody.innerHTML = page.map(l => `
      <tr id="row-${l.id}">
        <td style="color:#aaa;font-size:12px">#${l.id}</td>
        <td style="font-weight:600">${esc(l.child_name)}</td>
        <td>${l.age || '—'}</td>
        <td>${l.course ? `<span class="chip">${COURSE_LABELS[l.course] || l.course}</span>` : '—'}</td>
        <td><a href="tel:${esc(l.phone)}" class="phone-link">${esc(l.phone)}</a></td>
        <td>${l.email ? `<a href="mailto:${esc(l.email)}" style="color:#6C47FF">${esc(l.email)}</a>` : '—'}</td>
        <td>
          <select class="status-sel" onchange="changeStatus(${l.id}, this.value)">
            ${Object.entries(STATUS_LABELS).map(([v,lbl]) =>
              `<option value="${v}" ${l.status===v?'selected':''}>${lbl}</option>`
            ).join('')}
          </select>
        </td>
        <td>
          <input class="notes-input" value="${esc(l.notes||'')}" placeholder="Нотатки..."
            onblur="saveNotes(${l.id}, this.value)" onkeydown="if(event.key==='Enter')this.blur()"/>
        </td>
        <td style="color:#aaa;font-size:12px;white-space:nowrap">${l.created_at||''}</td>
        <td>
          ${currentRole === 'superadmin' ? `<button class="btn btn-danger btn-sm" onclick="deleteLead(${l.id})">✕</button>` : ''}
        </td>
      </tr>
    `).join('');
  }

  document.getElementById('pager').innerHTML = `
    <span>${filtered.length} заявок · стор. ${currentPage} з ${totalPages}</span>
    <div class="pager-btns">
      <button class="btn btn-ghost btn-sm" onclick="gotoPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹ Назад</button>
      <button class="btn btn-ghost btn-sm" onclick="gotoPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>Далі ›</button>
    </div>
  `;
}

function gotoPage(p) { currentPage = p; renderTable(); }

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function changeStatus(id, status) {
  try {
    await fetch(`/api/leads/${id}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
      body:    JSON.stringify({ status }),
    });
    const lead = allLeads.find(l => l.id === id);
    if (lead) lead.status = status;
    renderStats();
    showToast('Статус оновлено ✓', 'success');
  } catch { showToast('Помилка', 'error'); }
}

async function saveNotes(id, notes) {
  try {
    await fetch(`/api/leads/${id}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
      body:    JSON.stringify({ notes }),
    });
    const lead = allLeads.find(l => l.id === id);
    if (lead) lead.notes = notes;
    showToast('Нотатки збережено ✓', 'success');
  } catch { showToast('Помилка', 'error'); }
}

async function deleteLead(id) {
  if (!confirm('Видалити заявку #' + id + '?')) return;
  try {
    const res = await fetch(`/api/leads/${id}`, {
      method:  'DELETE',
      headers: { 'x-admin-token': token },
    });
    if (res.status === 403) { showToast('Немає прав для видалення', 'error'); return; }
    if (!res.ok)             { showToast('Помилка видалення', 'error'); return; }
    allLeads = allLeads.filter(l => l.id !== id);
    renderStats();
    renderTable();
    showToast('Заявку видалено', 'success');
  } catch { showToast('Помилка', 'error'); }
}

// ── CSV EXPORT ────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [
    ['#','Ім\'я дитини','Вік','Курс','Телефон','Email','Статус','Нотатки','Дата'],
    ...filtered.map(l => [
      l.id, l.child_name, l.age||'', l.course||'', l.phone, l.email||'',
      STATUS_LABELS[l.status]||l.status, l.notes||'', l.created_at||''
    ])
  ];
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `leads-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV завантажено ✓', 'success');
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── ADMINS MANAGEMENT (superadmin only) ──────────────────────────────────────
function showCreateAdminForm() {
  document.getElementById('createAdminForm').style.display = 'block';
  document.getElementById('newAdminName').focus();
}

async function createAdmin() {
  const nameEl = document.getElementById('newAdminName');
  const name   = nameEl.value.trim();
  if (!name) { showToast('Введіть ім\'я адміністратора', 'error'); nameEl.focus(); return; }
  try {
    const res  = await fetch('/api/admins', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
      body:    JSON.stringify({ name }),
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Помилка', 'error'); return; }
    nameEl.value = '';
    document.getElementById('createAdminForm').style.display = 'none';
    showToast(`Адміна "${name}" створено ✓`, 'success');
    await renderAdmins();
  } catch { showToast('Помилка сервера', 'error'); }
}

async function renderAdmins() {
  try {
    const res  = await fetch('/api/admins', { headers: { 'x-admin-token': token } });
    if (!res.ok) { showToast('Помилка завантаження', 'error'); return; }
    const data = await res.json();
    const list = data.admins || [];
    const tbody = document.getElementById('adminsBody');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty" style="padding:40px 20px">Адмінів поки немає. Натисніть «+ Додати адміна».</div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(a => `
      <tr>
        <td style="font-weight:600">${esc(a.name)}</td>
        <td>
          <code style="font-size:11px;background:#f0eeff;padding:2px 8px;border-radius:4px;word-break:break-all;user-select:all">${esc(a.token)}</code>
          <button class="btn btn-ghost btn-sm" style="margin-left:6px" onclick="copyToken('${esc(a.token)}')">📋</button>
        </td>
        <td>${a.active
          ? '<span class="badge badge-enrolled">Активний</span>'
          : '<span class="badge badge-rejected">Відкликано</span>'}</td>
        <td style="color:#aaa;font-size:12px;white-space:nowrap">${esc(a.createdAt)}</td>
        <td style="white-space:nowrap;display:flex;gap:6px">
          ${a.active ? `<button class="btn btn-ghost btn-sm" onclick="revokeAdmin(${a.id})">🔒 Відкликати</button>` : ''}
          <button class="btn btn-danger btn-sm" onclick="deleteAdminUser(${a.id})">✕ Видалити</button>
        </td>
      </tr>
    `).join('');
  } catch { showToast('Помилка завантаження адмінів', 'error'); }
}

async function revokeAdmin(id) {
  if (!confirm('Відкликати токен цього адміна? Він більше не зможе увійти.')) return;
  try {
    const res = await fetch(`/api/admins/${id}/revoke`, {
      method:  'PATCH',
      headers: { 'x-admin-token': token },
    });
    if (!res.ok) { showToast('Помилка', 'error'); return; }
    showToast('Токен відкликано ✓', 'success');
    await renderAdmins();
  } catch { showToast('Помилка', 'error'); }
}

async function deleteAdminUser(id) {
  if (!confirm('Видалити адміна назавжди? Цю дію не можна скасувати.')) return;
  try {
    const res = await fetch(`/api/admins/${id}`, {
      method:  'DELETE',
      headers: { 'x-admin-token': token },
    });
    if (!res.ok) { showToast('Помилка', 'error'); return; }
    showToast('Адміна видалено ✓', 'success');
    await renderAdmins();
  } catch { showToast('Помилка', 'error'); }
}

function copyToken(t) {
  navigator.clipboard?.writeText(t).then(() => showToast('Токен скопійовано ✓', 'success'))
    .catch(() => showToast('Не вдалося скопіювати', 'error'));
}

// ── AUTO LOGIN if token saved ─────────────────────────────────────────────────
if (token) showApp();
</script>
